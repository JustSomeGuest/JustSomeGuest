<svg width="360" height="100" viewBox="0 0 360 100" xmlns="http://www.w3.org/2000/svg">

    <defs>

        <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <linearGradient id="bg" x1="0" y1="0" x2="360" y2="100" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#141A2F"/>
            <stop offset="1" stop-color="#0C0F1A"/>
        </linearGradient>

    </defs>

    <rect
        x="11"
        y="11"
        width="338"
        height="78"
        rx="21"
        fill="url(#bg)"/>

    <rect
        x="11.5"
        y="11.5"
        width="337"
        height="77"
        rx="20.5"
        fill="none"
        stroke="#5865F2"
        stroke-width="3"
        stroke-dasharray="18 10"
        stroke-linecap="round"
        filter="url(#glow)">

        <animate
            attributeName="stroke-dashoffset"
            from="0"
            to="-56"
            dur="3.1s"
            repeatCount="indefinite"/>

        <animate
            attributeName="stroke-opacity"
            values="0.68;1;0.68"
            dur="2.4s"
            repeatCount="indefinite"/>

    </rect>

    <rect
        x="24"
        y="24"
        width="52"
        height="52"
        rx="13"
        fill="#5865F2"
        fill-opacity="0.18"/>

    <image
        href=""
        x="28"
        y="28"
        width="44"
        height="44"/>

    <text
        x="92"
        y="50"
        fill="#F5F7FF"
        font-size="26"
        font-weight="700"
        font-family="Segoe UI, Arial, sans-serif"
        dominant-baseline="middle">
        Discord Server
    </text>

</svg>
