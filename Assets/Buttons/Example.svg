<svg width="360" height="100" viewBox="0 0 360 100" xmlns="http://www.w3.org/2000/svg">

    <defs>

        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FFFFFF" flood-opacity="1"/>
        </filter>

    </defs>

    <rect
        x="11"
        y="11"
        width="338"
        height="78"
        rx="21"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="3"
        stroke-dasharray="10 8"
        stroke-linecap="round"
        filter="url(#glow)">

        <animate
            attributeName="stroke-dashoffset"
            from="0"
            to="-180"
            dur="6s"
            repeatCount="indefinite"/>

    </rect>

    <rect
        x="14"
        y="14"
        width="332"
        height="72"
        rx="18"
        fill="#111111"/>

    <rect
        x="24"
        y="24"
        width="52"
        height="52"
        rx="13"
        fill="#1D1D1D"/>

    <image
        href="data:image/png;base64,pic"
        x="28"
        y="28"
        width="44"
        height="44"/>

    <text
        x="92"
        y="50"
        fill="white"
        font-size="26"
        font-weight="700"
        font-family="Segoe UI, Arial, sans-serif"
        dominant-baseline="middle">
        Label
    </text>

</svg>
